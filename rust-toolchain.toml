[toolchain]
# c2pa 0.89 (and transitive deps using edition2024) require Rust 1.88+.
# "stable" is not a version pin — it just makes rustup select the current
# stable toolchain, which satisfies the requirement. Non-rustup installs
# ignore this file entirely; for them, `rust-version` in src-tauri/Cargo.toml
# turns the failure into a clear "requires rustc 1.88" error instead of a
# confusing "feature 'edition2024' is required" on a transitive dependency.
channel = "stable"
