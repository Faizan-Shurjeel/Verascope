name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri v2 Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workingDirectories: src-tauri

      - run: bun install
      - run: bunx tsc --noEmit
      - run: bun run build

      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml --no-default-features

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --no-default-features
